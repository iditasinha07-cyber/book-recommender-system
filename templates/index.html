<!DOCTYPE html>
<html>
<head>
<title>CS Book Recommender</title>

<style>

body{
font-family: Arial;
background-color:#f2f2f2;
text-align:center;
margin-top:100px;
}

.container{
background:white;
padding:30px;
width:400px;
margin:auto;
border-radius:10px;
box-shadow:0px 0px 10px grey;
}

input{
width:80%;
padding:10px;
margin:10px;
}

button{
padding:10px 20px;
background:#007BFF;
color:white;
border:none;
border-radius:5px;
}

li{
margin:10px;
}

</style>
</head>

<body>

<div class="container">

<h2>📚 Computer Science Book Recommender</h2>

<form method="POST">
<input type="text" name="query" placeholder="Enter topic like python or machine learning">
<br>
<button type="submit">Recommend</button>
</form>

<ul>
{% for book in books %}
<li>{{ book }}</li>
{% endfor %}
</ul>

</div>

</body>
</html>
